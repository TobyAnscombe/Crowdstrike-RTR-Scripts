name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  secret-scan:
    uses: TobyAnscombe/github-actions/.github/workflows/gitleaks.yml@main
    permissions:
      security-events: write

  powershell-lint:
    uses: TobyAnscombe/github-actions/.github/workflows/powershell-lint.yml@main
    with:
      settings_file: PSScriptAnalyzerSettings.psd1
